
server {
  listen 80;
  server_name _;

  # Primary root where the client bundle is copied in the Dockerfile.static
  root /usr/share/nginx/html;
  index index.html;

  # Try direct file, then /client prefixed file (some builds output into dist/client),
  # then fallback to SPA index pages in either location.
  location / {
    try_files $uri $uri/ /client$uri /client$uri/ /index.html /client/index.html;
  }

  # Static assets with long cache lifetime
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|json|webp|ttf|woff|woff2)$ {
    try_files $uri /client$uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Don't expose hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
